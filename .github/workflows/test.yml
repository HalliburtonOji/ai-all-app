name: Tests

# Manual-trigger only (changed 2026-04-30). The previous "run on every
# push" config burned ~15 min of CI per commit and still flaked under
# parallel-worker contention with Supabase signups. Until the Phase 3
# storageState refactor lands (per CLAUDE.md §16) and tests run in <2
# min reliably, CI Tests fires only when explicitly requested.
#
# Vercel's deploy already gates type-checks + builds on every push, so
# the auto-feedback loop on the build side is intact. Functional
# regressions are caught by:
#   - local `npm run test:e2e` before pushing meaningful changes
#   - the smoke-test workflow against the live deploy after deploy lands
#   - this Tests workflow when triggered manually (button in Actions UI)
#
# To trigger: GitHub repo → Actions tab → "Tests" → "Run workflow".
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Public Supabase env vars are needed at build time AND test time.
    # Service role key is added only to the cleanup step.
    # E2E_TEST_MODE puts the coach API into deterministic-mock mode so
    # tests don't hit Anthropic.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_TEST_MODE: "true"
      # The cron-secret test exercises the auth check on /api/cron/extract-facts:
      # without a Bearer header, we expect 401. The route otherwise returns 500
      # if CRON_SECRET isn't set at all (treats it as a misconfigured server).
      # Any non-empty value works for tests — they don't actually call cron.
      CRON_SECRET: "test-cron-secret-not-real"
      # The admin-extract test mode bypass already triggers on E2E_TEST_MODE,
      # but setting this anyway keeps prod and CI shapes parallel.
      ADMIN_USER_ID: "00000000-0000-0000-0000-000000000000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright (browser + system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build Next.js app
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Cleanup test users in Supabase
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/cleanup-test-users.mjs

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload failure artifacts (screenshots, videos, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: test-results/
          retention-days: 30
